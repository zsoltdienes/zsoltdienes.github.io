<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zsolt Dienes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fff;
    }

    .image-wrapper {
      width: 50vw;
      display: flex;
      justify-content: center;
    }

    .image-wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 768px) {
      .image-wrapper {
        width: 90vw;
      }
    }
  </style>
</head>
<body>
  <div class="image-wrapper">
    <img src="minoseg_janos.jpg" alt="Minoseg Janos">
  </div>
</body>
</html>
