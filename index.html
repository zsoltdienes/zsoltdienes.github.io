<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zsolt Dienes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fff;
    }

    .image-wrapper {
      width: 50vw;
      display: flex;
      justify-content: center;
    }

    .figure {
      width: 100%;
      margin: 0;
    }

    .image-wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }

    .figure figcaption {
      width: 100%;
      margin-top: 0.75rem;
      font-size: 0.95rem;
      line-height: 1.4;
      text-align: center;
    }

    .figure figcaption a {
      color: inherit;
    }

    @media (max-width: 768px) {
      .image-wrapper {
        width: 90vw;
      }
    }
  </style>
</head>
<body>
  <div class="image-wrapper">
    <figure class="figure">
      <img src="minoseg_janos.jpg" alt="Minoseg Janos">
      <figcaption><a href="https://szoftverteszter.hu">szoftverteszter.hu</a></figcaption>
    </figure>
  </div>
</body>
</html>
